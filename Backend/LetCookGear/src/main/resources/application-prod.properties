spring.jpa.show-sql=false

# Prod profile Flyway behavior
spring.flyway.baseline-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# Never auto-seed in production unless explicitly enabled
app.seed.run-on-startup=${APP_SEED_RUN_ON_STARTUP:false}
app.seed.endpoint-enabled=${APP_SEED_ENDPOINT_ENABLED:false}
