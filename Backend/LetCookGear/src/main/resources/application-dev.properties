spring.jpa.show-sql=false

# Focused auth logs for login debugging
logging.level.org.springframework.security=INFO
logging.level.com.ducthin.LetCookGear.security=DEBUG
logging.level.com.ducthin.LetCookGear.service.AuthService=DEBUG

# Dev profile Flyway behavior
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=false

# Dev data seed controls
app.seed.run-on-startup=${APP_SEED_RUN_ON_STARTUP:true}
app.seed.endpoint-enabled=${APP_SEED_ENDPOINT_ENABLED:true}

# Seed admin account (environment-driven)
seed.admin.email=${SEED_ADMIN_EMAIL:admin@letcookgear.local}
seed.admin.password=${SEED_ADMIN_PASSWORD}
seed.admin.full-name=${SEED_ADMIN_FULL_NAME:System Admin}
seed.admin.phone=${SEED_ADMIN_PHONE:0900000000}
