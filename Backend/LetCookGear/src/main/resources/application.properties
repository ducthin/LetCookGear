spring.application.name=LetCookGear

spring.config.import=optional:file:../.env[.properties],optional:file:Backend/.env[.properties],optional:file:.env[.properties]

spring.profiles.active=${SPRING_PROFILES_ACTIVE}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Let Flyway own schema changes. Hibernate only validates mappings.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Shared Flyway settings
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# JWT settings (override in production via environment variables)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

# PayOS settings
payos.enabled=${PAYOS_ENABLED:false}
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}
payos.return-url=${PAYOS_RETURN_URL:http://localhost:5000/shop/orders}
payos.cancel-url=${PAYOS_CANCEL_URL:http://localhost:5000/shop/orders}
