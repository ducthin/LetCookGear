<section class="auth-wrapper">
  <article class="auth-card">
    <div class="card-head">
      <p class="eyebrow">LETCOOKGEAR ACCESS</p>
      <h1>Tạo tài khoản</h1>
      <p>Đăng ký nhanh để lưu cấu hình, theo dõi đơn và nhận ưu đãi thành viên.</p>
    </div>

    <div class="quick-links">
      <a routerLink="/">Trang chủ</a>
      <a routerLink="/shop/products">Mua sắm</a>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        Họ và tên
        <input type="text" formControlName="fullName" placeholder="Nhập họ và tên" />
      </label>
      <small class="field-error" *ngIf="form.controls.fullName.touched && form.controls.fullName.invalid">
        Họ và tên phải có ít nhất 3 ký tự.
      </small>

      <label>
        Email
        <input type="email" formControlName="email" placeholder="ban@example.com" />
      </label>
      <small class="field-error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Vui lòng nhập email hợp lệ.
      </small>

      <label>
        Số điện thoại
        <input type="text" formControlName="phone" placeholder="Không bắt buộc" />
      </label>

      <label>
        Mật khẩu
        <div class="password-row">
          <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Tối thiểu 6 ký tự" />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()">
            {{ showPassword() ? 'Ẩn' : 'Hiện' }}
          </button>
        </div>
      </label>
      <small class="field-error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
        Mật khẩu phải có ít nhất 6 ký tự.
      </small>

      <p class="error-box" *ngIf="error()">{{ error() }}</p>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Đang tạo tài khoản...' : 'Đăng ký' }}
      </button>
    </form>

    <p class="switch-link">
      Đã có tài khoản?
      <a routerLink="/auth/login">Đăng nhập</a>
    </p>
  </article>
</section>
